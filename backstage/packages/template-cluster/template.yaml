apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: request-aks-workload-cluster
  title: Request AKS Workload Cluster
  description: Create a GitOps pull request for a new CAPZ-managed AKS workload cluster.
  tags:
    - aks
    - capz
    - gitops
    - platform-engineering
spec:
  owner: platform-engineering
  type: infrastructure

  parameters:
    - title: Workload cluster request
      required:
        - clusterName
        - resourceGroupName
        - location
        - fleetGroup
      properties:
        clusterName:
          title: Cluster name
          type: string
          description: Lowercase AKS cluster name to create through GitOps.
          default: aks-customer-demo
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          ui:autofocus: true
        resourceGroupName:
          title: Resource group name
          type: string
          description: Azure resource group for the workload AKS cluster.
          default: aks-customer-demo
        location:
          title: Azure region
          type: string
          description: Azure region for the workload cluster.
          default: westus3
        kubernetesVersion:
          title: Kubernetes version
          type: string
          description: AKS version supported in the selected region.
          default: v1.33.12
        agentSku:
          title: System node pool VM size
          type: string
          description: Demo default uses Standard_D4s_v5 with Managed OS disk.
          default: Standard_D4s_v5
        agentCount:
          title: System node count
          type: integer
          description: Number of nodes in the system pool.
          default: 1
          minimum: 1
        systemPoolName:
          title: System pool name
          type: string
          description: AKS Linux node pool names must be 12 characters or fewer.
          default: sys
          maxLength: 12
        fleetMemberName:
          title: Fleet member name
          type: string
          description: Name used when joining the cluster to Azure Kubernetes Fleet Manager after AKS is ready.
          default: aks-customer-demo-fleet-member
        fleetGroup:
          title: Fleet update group
          type: string
          description: Fleet update group for the workload cluster.
          default: customer-demo
        sshPublicKey:
          title: SSH public key
          type: string
          description: Optional SSH public key. Leave blank for the demo default.
          default: ''
          ui:widget: textarea

    - title: GitOps repository pull request
      required:
        - repoUrl
        - pullRequestTitle
        - commitMessage
      properties:
        repoUrl:
          title: GitOps repository
          type: string
          description: Repository that ArgoCD watches for cluster definitions.
          default: github.com?owner=zhangchl007&repo=aks-platform-engineering
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
        pullRequestTitle:
          title: Pull request title
          type: string
          default: Add AKS workload cluster request
        commitMessage:
          title: Commit message
          type: string
          default: Add AKS workload cluster request

  steps:
    - id: fetch-repo
      name: Fetch GitOps repository
      action: fetch:plain
      input:
        url: https://${{ (parameters.repoUrl | parseRepoUrl).host }}/${{ (parameters.repoUrl | parseRepoUrl).owner }}/${{ (parameters.repoUrl | parseRepoUrl).repo }}.git
        targetPath: ./gitops-repo

    - id: render-cluster-definition
      name: Render CAPZ cluster definition
      action: fetch:template
      input:
        url: ./content
        targetPath: ./gitops-repo
        values:
          clusterName: ${{ parameters.clusterName }}
          resourceGroupName: ${{ parameters.resourceGroupName }}
          location: ${{ parameters.location }}
          kubernetesVersion: ${{ parameters.kubernetesVersion }}
          agentSku: ${{ parameters.agentSku }}
          agentCount: ${{ parameters.agentCount }}
          systemPoolName: ${{ parameters.systemPoolName }}
          fleetMemberName: ${{ parameters.fleetMemberName }}
          fleetGroup: ${{ parameters.fleetGroup }}
          sshPublicKey: ${{ parameters.sshPublicKey }}

    - id: rename-cluster-definition
      name: Name cluster definition file
      action: fs:rename
      input:
        files:
          - from: ./gitops-repo/gitops/clusters/capz/cluster-definitions/template.yaml
            to: ./gitops-repo/gitops/clusters/capz/cluster-definitions/${{ parameters.clusterName }}.yaml

    - id: publish-pr
      name: Create GitOps pull request
      action: publish:github:pull-request
      input:
        repoUrl: ${{ parameters.repoUrl }}
        title: ${{ parameters.pullRequestTitle }}
        description: |
          Backstage request for AKS workload cluster `${{ parameters.clusterName }}`.

          After this pull request is merged:
          1. ArgoCD syncs the CAPZ cluster definition.
          2. CAPZ provisions AKS with `${{ parameters.agentSku }}`.
          3. Platform team joins the cluster to Fleet Manager with `az fleet member create`.
        commitMessage: ${{ parameters.commitMessage }}
        sourcePath: ./gitops-repo
        branchName: backstage/${{ parameters.clusterName }}
        update: true

  output:
    links:
      - title: Pull request
        url: ${{ steps['publish-pr'].output.remoteUrl }}
      - title: Cluster definition path
        icon: catalog
        url: https://${{ (parameters.repoUrl | parseRepoUrl).host }}/${{ (parameters.repoUrl | parseRepoUrl).owner }}/${{ (parameters.repoUrl | parseRepoUrl).repo }}/tree/backstage/${{ parameters.clusterName }}/gitops/clusters/capz/cluster-definitions/${{ parameters.clusterName }}.yaml
