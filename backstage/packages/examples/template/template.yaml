apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: deploy-kubernetes-application
  title: Deploy Application with ArgoCD
  description: Create a GitOps pull request that deploys an application to AKS through ArgoCD.
  tags:
    - application
    - argocd
    - gitops
    - kubernetes
spec:
  owner: platform-engineering
  type: service

  parameters:
    - title: Application details
      required:
        - name
        - namespace
      properties:
        name:
          title: Application name
          type: string
          description: Lowercase name used for Backstage catalog, ArgoCD, and Kubernetes labels.
          default: aks-store-demo
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          ui:autofocus: true
        namespace:
          title: Kubernetes namespace
          type: string
          description: Target namespace for the application.
          default: aks-store-demo
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        owner:
          title: Service owner
          type: string
          description: Backstage owner for the generated catalog component.
          default: platform-engineering
        description:
          title: Description
          type: string
          description: Short catalog description for the application.
          default: AKS Store Demo application deployed by ArgoCD.

    - title: Application repository
      required:
        - appRepoUrl
        - appPath
      properties:
        appRepoUrl:
          title: Application repository
          type: string
          description: Repository containing the Kubernetes manifests or Kustomize overlay.
          default: github.com?owner=Azure-Samples&repo=aks-store-demo
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
        appPath:
          title: Manifest path
          type: string
          description: Path inside the application repository for ArgoCD to sync.
          default: kustomize/overlays/dev
        targetRevision:
          title: Target revision
          type: string
          description: Branch, tag, or commit for ArgoCD to sync.
          default: HEAD

    - title: GitOps repository pull request
      required:
        - argoRepoUrl
        - pullRequestTitle
        - commitMessage
      properties:
        argoRepoUrl:
          title: GitOps repository
          type: string
          description: Repository watched by control-plane ArgoCD.
          default: github.com?owner=zhangchl007&repo=aks-platform-engineering
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
        pullRequestTitle:
          title: Pull request title
          type: string
          default: Add application GitOps definition
        commitMessage:
          title: Commit message
          type: string
          default: Add application GitOps definition

  steps:
    - id: fetch-repo
      name: Fetch GitOps repository
      action: fetch:plain
      input:
        url: https://${{ (parameters.argoRepoUrl | parseRepoUrl).host }}/${{ (parameters.argoRepoUrl | parseRepoUrl).owner }}/${{ (parameters.argoRepoUrl | parseRepoUrl).repo }}.git
        targetPath: ./gitops-repo

    - id: render-app-gitops
      name: Render application GitOps files
      action: fetch:template
      input:
        url: ./content
        targetPath: ./gitops-repo
        values:
          name: ${{ parameters.name }}
          namespace: ${{ parameters.namespace }}
          owner: ${{ parameters.owner }}
          description: ${{ parameters.description }}
          appRepoUrl: https://${{ (parameters.appRepoUrl | parseRepoUrl).host }}/${{ (parameters.appRepoUrl | parseRepoUrl).owner }}/${{ (parameters.appRepoUrl | parseRepoUrl).repo }}.git
          appPath: ${{ parameters.appPath }}
          targetRevision: ${{ parameters.targetRevision }}

    - id: rename-app-folder
      name: Name application GitOps folder
      action: fs:rename
      input:
        files:
          - from: ./gitops-repo/gitops/apps/myapp
            to: ./gitops-repo/gitops/apps/${{ parameters.name }}
          - from: ./gitops-repo/gitops/apps/${{ parameters.name }}/petArgoApp.yaml
            to: ./gitops-repo/gitops/apps/${{ parameters.name }}/${{ parameters.name }}-argocd-app.yaml

    - id: publish-pr
      name: Create GitOps pull request
      action: publish:github:pull-request
      input:
        title: ${{ parameters.pullRequestTitle }}
        description: |
          Backstage request to deploy application `${{ parameters.name }}`.

          This pull request adds:
          - Backstage catalog metadata for the application.
          - An ArgoCD Application manifest under `gitops/apps/${{ parameters.name }}`.
        repoUrl: ${{ parameters.argoRepoUrl }}
        commitMessage: ${{ parameters.commitMessage }}
        sourcePath: ./gitops-repo
        branchName: backstage/${{ parameters.name }}
        update: true

    - id: register
      name: Register catalog component
      action: catalog:register
      input:
        repoContentsUrl: https://${{ (parameters.argoRepoUrl | parseRepoUrl).host }}/${{ (parameters.argoRepoUrl | parseRepoUrl).owner }}/${{ (parameters.argoRepoUrl | parseRepoUrl).repo }}
        catalogInfoPath: /blob/backstage/${{ parameters.name }}/catalog-info.yaml
        optional: true

  output:
    links:
      - title: Pull request
        url: ${{ steps['publish-pr'].output.remoteUrl }}
      - title: ArgoCD application manifest
        icon: catalog
        url: https://${{ (parameters.argoRepoUrl | parseRepoUrl).host }}/${{ (parameters.argoRepoUrl | parseRepoUrl).owner }}/${{ (parameters.argoRepoUrl | parseRepoUrl).repo }}/tree/backstage/${{ parameters.name }}/gitops/apps/${{ parameters.name }}/${{ parameters.name }}-argocd-app.yaml
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
