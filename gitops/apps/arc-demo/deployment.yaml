apiVersion: apps/v1
kind: Deployment
metadata:
  name: arc-demo
  namespace: arc-demo
  labels:
    app.kubernetes.io/name: arc-demo
    app.kubernetes.io/part-of: arc-onboarding
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: arc-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arc-demo
    spec:
      containers:
        - name: podinfo
          image: ghcr.io/stefanprodan/podinfo:6.7.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9898
          env:
            - name: PODINFO_UI_MESSAGE
              value: "Synced by control-plane ArgoCD via Azure Arc"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
