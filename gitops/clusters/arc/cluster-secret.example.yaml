################################################################################
# TEMPLATE — ArgoCD cluster Secret for an Azure Arc-enabled (external) cluster.
#
# This is an EXAMPLE only. The onboarding script (scripts/arc-onboard.*) renders a
# concrete copy by replacing every __PLACEHOLDER__ and applies it to the
# control-plane's `argocd` namespace. DO NOT commit a rendered copy — it carries a
# bearer token / connection config.
#
# Labels drive ApplicationSet selection; annotations feed ApplicationSet templates.
################################################################################
apiVersion: v1
kind: Secret
metadata:
  name: __CLUSTER_NAME__
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    # --- selectors used by the addon ApplicationSets ---
    environment: arc                       # excluded from the broad cluster-addons sweep
    enable_arc_onboarding: "true"          # selected by addons-arc-onboarding ApplicationSet
    provider: arc
    # --- curated addon enables applied to Arc clusters (extend as needed) ---
    enable_metrics_server: "false"
  annotations:
    # GitOps repo coordinates (from: terraform output -json arc_onboarding)
    addons_repo_url: "__ADDONS_REPO_URL__"
    addons_repo_basepath: "__ADDONS_REPO_BASEPATH__"
    addons_repo_path: "__ADDONS_REPO_PATH__"
    addons_repo_revision: "__ADDONS_REPO_REVISION__"
    # Azure identifiers (informational / reused by templates)
    subscription_id: "__SUBSCRIPTION_ID__"
    tenant_id: "__TENANT_ID__"
    akspe_identity_id: "__AKSPE_CLIENT_ID__"
    arc_resource_group: "__ARC_RESOURCE_GROUP__"
type: Opaque
stringData:
  name: __CLUSTER_NAME__
  # API server endpoint ArgoCD will use. For Arc private clusters this is the
  # cluster-connect proxy endpoint; for reachable clusters it is the API server URL.
  server: "__CLUSTER_SERVER__"
  config: |
    {
      "bearerToken": "__BEARER_TOKEN__",
      "tlsClientConfig": {
        "insecure": false,
        "caData": "__CA_DATA_B64__"
      }
    }
