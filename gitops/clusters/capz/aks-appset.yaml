apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: aks-workload-clusters
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchExpressions:
                  - key: akuity.io/argo-cd-cluster-name
                    operator: NotIn
                    values: [in-cluster]
                  - key: environment
                    operator: In
                    values: [control-plane]
                  - key: enable_cluster_api_operator
                    operator: In
                    values: ['true']
          - git:
              # Keep this aligned with the repo/revision used by the control-plane
              # GitOps Bridge annotations when demonstrating from a feature branch.
              repoURL: https://github.com/zhangchl007/aks-platform-engineering
              revision: zhangchl007-azure-arc-onboarding
              files:
                - path: gitops/clusters/capz/cluster-definitions/*.yaml
  template:
    metadata:
      name: '{{workloadClusterName}}'
      namespace: argocd
    spec:
      destination:
        namespace: workload
        name: '{{name}}'
      project: default
      source:
        repoURL: '{{metadata.annotations.addons_repo_url}}'
        targetRevision: '{{metadata.annotations.addons_repo_revision}}'
        path: '{{metadata.annotations.addons_repo_basepath}}clusters/capz/charts/azure-managed-cluster'
        helm:
          values: |
            subscriptionID: '{{metadata.annotations.subscription_id}}'
            cluster:
              name: '{{workloadClusterName}}'
              resourceGroupName: '{{resourceGroupName}}'
              location: '{{location}}'
            identity:
              clientID: '{{metadata.annotations.akspe_identity_id}}'
              tenantID: '{{metadata.annotations.tenant_id}}'
              type: WorkloadIdentity
            controlplane:
              kubernetes_version: '{{kubernetesVersion}}'
              networkPluginMode: overlay
              sshPublicKey: '{{sshPublicKey}}'
              fleetsMember:
                enabled: {{metadata.labels.enable_fleet_member}}
                name: '{{fleetMemberName}}'
                group: '{{fleetGroup}}'
                managerName: '{{metadata.annotations.fleet_name}}'
                managerResourceGroup: '{{metadata.annotations.fleet_resource_group}}'
            agentPools:
              - name: '{{systemPoolName}}'
                mode: System
                sku: '{{agentSku}}'
                nodecount: {{agentCount}}
                availabilityZones:
                  - '1'
                  - '3'
      syncPolicy:
        automated:
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: -1
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 60m
