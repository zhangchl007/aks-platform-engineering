---
# Deploys the Arc baseline (gitops/apps/arc-demo) to every Azure Arc-enabled
# cluster registered into the control-plane ArgoCD. Selection is driven by the
# `enable_arc_onboarding=true` label set on the cluster Secret by the onboarding
# script (scripts/arc-onboard.*).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons-arc-onboarding
  namespace: argocd
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - clusters:
        selector:
          matchExpressions:
            - key: akuity.io/argo-cd-cluster-name
              operator: NotIn
              values: [in-cluster]
            - key: enable_arc_onboarding
              operator: In
              values: ['true']
  template:
    metadata:
      name: arc-baseline-{{name}}
    spec:
      project: default
      source:
        repoURL: '{{metadata.annotations.addons_repo_url}}'
        targetRevision: '{{metadata.annotations.addons_repo_revision}}'
        path: '{{metadata.annotations.addons_repo_basepath}}apps/arc-demo'
        directory:
          recurse: true
      destination:
        namespace: arc-demo
        name: '{{name}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: -1
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
